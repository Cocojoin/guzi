<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计算 SHA-256 哈希</title>
</head>
<body>
    <h1>计算 SHA-256 密码哈希</h1>
    <div>
        <label>输入密码：</label>
        <input type="text" id="password" value="cc19980905">
        <button onclick="calculateHash()">计算哈希</button>
    </div>
    <div id="result"></div>
    
    <script>
        /**
         * SHA-256 实现
         */
        function sha256(message) {
            function rightRotate(value, amount) {
                return (value >>> amount) | (value << (32 - amount));
            }

            const mathPow = Math.pow;
            const maxWord = mathPow(2, 32);
            const lengthProperty = "length";
            let i, j;
            let result = "";

            const words = [];
            const asciiBitLength = message[lengthProperty] * 8;

            // Initialize hash values
            let hash = [0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a, 0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19];
            const k = [0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
                       0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
                       0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
                       0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
                       0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
                       0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
                       0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
                       0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2];

            // Pre-processing
            message += String.fromCharCode(0x80);
            while ((message[lengthProperty] % 64) - 56) {
                message += String.fromCharCode(0x00);
            }
            for (i = 0; i < message[lengthProperty]; i += 1) {
                j = message.charCodeAt(i);
                if (j >> 8) {
                    throw new Error("Only ASCII is supported");
                }
                words[i >> 2] |= j << (((3 - i) % 4) * 8);
            }
            words[words[lengthProperty]] = (asciiBitLength / maxWord) | 0;
            words[words[lengthProperty]] = asciiBitLength;

            // Process the message in successive 512-bit chunks
            for (j = 0; j < words[lengthProperty];) {
                const w = words.slice(j, j += 16);
                const oldHash = hash.slice(0);
                let a = oldHash[0], b = oldHash[1], c = oldHash[2], d = oldHash[3];
                let e = oldHash[4], f = oldHash[5], g = oldHash[6], h = oldHash[7];

                for (i = 0; i < 64; i += 1) {
                    const w15 = w[i - 15], w2 = w[i - 2];
                    const s0 = i < 16 ? w[i] : (w[i - 16] + (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15 >>> 3)) + w[i - 7] + (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2 >>> 10))) | 0;
                    w[i] = s0;

                    const s1 = rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25);
                    const ch = (e & f) ^ (~e & g);
                    const temp1 = (h + s1 + ch + k[i] + w[i]) | 0;
                    const s0 = rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22);
                    const maj = (a & b) ^ (a & c) ^ (b & c);
                    const temp2 = (s0 + maj) | 0;

                    h = g; g = f; f = e; e = (d + temp1) | 0;
                    d = c; c = b; b = a; a = (temp1 + temp2) | 0;
                }

                hash[0] = (hash[0] + a) | 0;
                hash[1] = (hash[1] + b) | 0;
                hash[2] = (hash[2] + c) | 0;
                hash[3] = (hash[3] + d) | 0;
                hash[4] = (hash[4] + e) | 0;
                hash[5] = (hash[5] + f) | 0;
                hash[6] = (hash[6] + g) | 0;
                hash[7] = (hash[7] + h) | 0;
            }

            // Convert the hash to hex string
            function toHex(word) {
                let hex = "";
                for (let i = 3; i >= 0; i--) {
                    const byte = (word >> (i * 8)) & 0xff;
                    hex += ((byte < 16) ? "0" : "") + byte.toString(16);
                }
                return hex;
            }

            for (i = 0; i < 8; i++) {
                result += toHex(hash[i]);
            }

            return result;
        }

        function calculateHash() {
            const password = document.getElementById('password').value;
            const hash = sha256(password);
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <p>密码: ${password}</p>
                <p>哈希: sha256$${hash}</p>
            `;
            console.log('密码哈希:', 'sha256$' + hash);
        }

        // 页面加载时自动计算
        window.onload = function() {
            calculateHash();
        };
    </script>
</body>
</html>
